name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Token
        run: |
          node -e "
            const fs = require('fs');
            const token = process.env.GH_TOKEN || 'TOKEN_PLACEHOLDER';
            let content = fs.readFileSync('index.html', 'utf8');
            content = content.replace(/TOKEN_PLACEHOLDER/g, token);
            fs.writeFileSync('index.html', content);
            console.log('Token injected:', content.includes('ghp_') ? 'success' : 'failed');
          "
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Verify Token
        run: |
          if grep -q "TOKEN_PLACEHOLDER" index.html; then
            echo "ERROR: Token injection failed!"
            exit 1
          else
            echo "SUCCESS: Token injected"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
